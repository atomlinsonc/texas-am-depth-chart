<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texas A&amp;M Depth Chart</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="hero__meta">
          <p class="eyebrow">Texas A&amp;M Aggies Football</p>
          <h1 id="hero-title">Loading depth chart...</h1>
          <p class="hero__copy" id="hero-copy"></p>
          <div class="hero__actions" role="group" aria-label="Depth chart string selector">
            <button class="segmented is-active" data-depth="0">Starters</button>
            <button class="segmented" data-depth="1">Second String</button>
            <button class="segmented" data-depth="2">Third String</button>
          </div>
        </div>
        <div class="hero__crest">
          <img id="hero-logo" alt="Texas A&amp;M logo" />
        </div>
      </section>

      <section class="board">
        <div class="board__header">
          <div class="board__summary">
            <div class="summary-strip">
              <span class="summary-strip__label">Offense</span>
              <div class="style-row" id="offense-style"></div>
            </div>
            <div class="summary-strip">
              <span class="summary-strip__label">Defense</span>
              <div class="style-row" id="defense-style"></div>
            </div>
          </div>
          <p class="board__team" id="board-team">Texas A&amp;M Aggies</p>
        </div>
        <div class="field field--combined">
          <div class="field__zone field__zone--defense">Defense</div>
          <div class="field__zone field__zone--offense">Offense</div>
          <div class="field__line">Line of Scrimmage</div>
          <div class="coach-overlay" id="coach-overlay"></div>
          <div class="field__surface" id="team-field"></div>
        </div>
      </section>
    </main>

    <dialog class="player-modal" id="player-modal">
      <button class="player-modal__close" id="modal-close" aria-label="Close player card">×</button>
      <div class="player-modal__content" id="modal-content"></div>
    </dialog>

    <template id="player-modal-template">
      <article class="modal-card">
        <div class="modal-card__header">
          <img class="modal-card__headshot" alt="" />
          <div>
            <p class="modal-card__depth"></p>
            <h3 class="modal-card__name"></h3>
            <p class="modal-card__meta"></p>
            <div class="badge-row"></div>
          </div>
          <div class="rating-pill">
            <span>Player Grade</span>
            <strong></strong>
          </div>
        </div>
        <div class="bio-block">
          <p class="modal-card__bio"></p>
          <button class="bio-toggle" type="button" hidden></button>
        </div>
        <div class="stat-block">
          <h4>CSV Profile</h4>
          <div class="stat-grid"></div>
        </div>
        <div class="link-row"></div>
      </article>
    </template>

    <template id="coach-modal-template">
      <article class="modal-card">
        <div class="modal-card__header">
          <img class="modal-card__headshot" alt="" />
          <div>
            <p class="modal-card__depth"></p>
            <h3 class="modal-card__name"></h3>
            <p class="modal-card__meta"></p>
          </div>
        </div>
        <div class="bio-block">
          <p class="modal-card__bio"></p>
          <button class="bio-toggle" type="button" hidden></button>
        </div>
        <div class="stat-block">
          <h4>Tendencies</h4>
          <div class="tendency-list"></div>
        </div>
        <div class="link-row"></div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
